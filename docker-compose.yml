services:
  strm-manager:
    build: .
    image: strm-manager:latest
    ports:
      - '4173:4173'
    environment:
      PORT: 4173
      ADMIN_PASSWORD: admin
      DATABASE_PATH: /app/data/database.sqlite
    volumes:
      - strm-manager-data:/app/data
      # Add your STRM output directory here, then use the container path in task targetPath.
      # - D:/media/strm:/media/strm
    restart: unless-stopped

volumes:
  strm-manager-data:
