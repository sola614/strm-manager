version: '3.9'

services:
  strm-manager:
    build: .
    image: strm-manager:latest
    ports:
      - '4173:4173'
    environment:
      PORT: 4173
      ADMIN_PASSWORD: admin
      DATABASE_PATH: /app/data/database.sqlite
    volumes:
      - strm-manager-data:/app/data
    restart: unless-stopped

volumes:
  strm-manager-data:
