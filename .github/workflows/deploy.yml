name: 手动构建并推送到 GitHub 镜像仓库

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'v1.0.0'
        required: true
        default: 'latest'

# 必须要赋予工作流读写 Packages 的权限
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取仓库代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. 登录到 GitHub 官方镜像仓库 (ghcr.io)
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }} # 自动获取执行构建的用户名
        password: ${{ secrets.GITHUB_TOKEN }} # 自动获取内置的临时密码

    # 4. 构建并推送镜像
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        # 注意：打包出来的镜像名必须全部小写，这里使用 github.repository_owner 自动适配
        tags: |
          ghcr.io/${{ github.repository_owner }}/my-app:${{ github.event.inputs.image_tag }}