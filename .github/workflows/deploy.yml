name: 手动构建并推送到 GitHub 镜像仓库

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker 镜像标签，留空时默认使用 package.json 的 version'
        required: false
        default: ''

# 必须要赋予工作流读写 Packages 的权限
permissions:
  contents: read
  packages: write

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取仓库代码
    - name: Checkout code
      uses: actions/checkout@v6

    # 2. 设置 Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    # 3. 登录到 GitHub 官方镜像仓库 (ghcr.io)
    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }} # 自动获取执行构建的用户名
        password: ${{ secrets.GITHUB_TOKEN }} # 自动获取内置的临时密码

    # 4. 生成镜像信息，并校验手动输入的 tag 是否符合 Docker 规范
    - name: Prepare image metadata
      id: meta
      shell: bash
      env:
        IMAGE_TAG: ${{ github.event.inputs.image_tag }}
      run: |
        tag="$IMAGE_TAG"
        if [[ -z "$tag" ]]; then
          tag=$(node -p "require('./package.json').version")
        fi
        if [[ ! "$tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
          echo "Invalid Docker tag: $tag" >&2
          exit 1
        fi

        image="ghcr.io/${GITHUB_REPOSITORY,,}"
        echo "image=$image" >> "$GITHUB_OUTPUT"
        echo "tag=$tag" >> "$GITHUB_OUTPUT"

    # 5. 构建并推送镜像
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        tags: |
          ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          ${{ steps.meta.outputs.image }}:latest
